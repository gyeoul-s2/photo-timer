<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Flow Timer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&family=Space+Mono:wght@400;700&family=Bebas+Neue&family=Playfair+Display:wght@400;700&family=Oswald:wght@300;400&family=DM+Serif+Display&family=Rajdhani:wght@300;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --border: rgba(255,255,255,0.08);
  --text: #e8e8e8;
  --muted: #888;
  --accent: #d4c5a9;
  --font-ui: 'Inter', sans-serif;
  --font-timer: 'JetBrains Mono', monospace;
  --timer-size: 5rem;
  --photo-interval: 8;
  --transition-duration: 1.2s;
  --overlay-color: 0,0,0;
  --overlay-opacity: 0.35;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  min-height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* ── PHOTO CANVAS ── */
#photo-canvas { position: fixed; inset: 0; z-index: 0; }

.photo-slot {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  opacity: 0;
}

body.framed .photo-slot { inset: 40px; border-radius: 4px; }

/* fade */
body.transition-fade .photo-slot.active { opacity: 1; transition: opacity var(--transition-duration) ease; }
body.transition-fade .photo-slot.leaving { opacity: 0; transition: opacity var(--transition-duration) ease; }

/* slide */
body.transition-slide .photo-slot { transform: translateX(100%); transition: transform var(--transition-duration) cubic-bezier(0.4,0,0.2,1), opacity 0s; }
body.transition-slide .photo-slot.active { opacity: 1; transform: translateX(0); }
body.transition-slide .photo-slot.leaving { opacity: 1; transform: translateX(-100%); transition: transform var(--transition-duration) cubic-bezier(0.4,0,0.2,1); }

/* river */
body.transition-river .photo-slot { opacity: 0; background-size: 130%; background-position: 120% center; transition: background-position calc(var(--transition-duration) * 8) linear, opacity var(--transition-duration) ease; }
body.transition-river .photo-slot.active { opacity: 1; background-position: 50% center; }
body.transition-river .photo-slot.leaving { opacity: 0; transition: opacity var(--transition-duration) ease; }

/* ── PHOTO OVERLAY (tint/dim) ── */
#photo-overlay {
  position: fixed;
  inset: 0;
  z-index: 1;
  background: rgba(var(--overlay-color), var(--overlay-opacity));
  pointer-events: none;
  transition: background 0.4s;
}

/* ── GRADIENT (bottom fade for UI) ── */
#gradient-overlay {
  position: fixed;
  inset: 0;
  z-index: 2;
  background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 40%);
  pointer-events: none;
}

/* ── TIMER DISPLAY ── */
#timer-display {
  position: fixed;
  z-index: 10;
  font-family: var(--font-timer);
  font-size: var(--timer-size);
  font-weight: 400;
  color: var(--text);
  letter-spacing: -0.02em;
  line-height: 1;
  transition: color 0.3s;
  pointer-events: none;
  text-shadow: 0 2px 12px rgba(0,0,0,0.5);
}

/* Font variants */
#timer-display.font-mono     { font-family: 'JetBrains Mono', monospace; font-weight: 400; letter-spacing: -0.02em; }
#timer-display.font-space    { font-family: 'Space Mono', monospace;     font-weight: 400; letter-spacing: -0.03em; }
#timer-display.font-bebas    { font-family: 'Bebas Neue', sans-serif;    font-weight: 400; letter-spacing: 0.05em; }
#timer-display.font-playfair { font-family: 'Playfair Display', serif;   font-weight: 400; letter-spacing: 0.01em; }
#timer-display.font-oswald   { font-family: 'Oswald', sans-serif;        font-weight: 300; letter-spacing: 0.08em; }
#timer-display.font-dm-serif { font-family: 'DM Serif Display', serif;   font-weight: 400; letter-spacing: 0em; }
#timer-display.font-rajdhani { font-family: 'Rajdhani', sans-serif;      font-weight: 300; letter-spacing: 0.12em; }

#timer-display.warning { color: #e8c99a !important; }
#timer-display.urgent  { color: #e89a9a !important; }

/* timer positions */
body.pos-center       #timer-display { top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
body.pos-bottom-right #timer-display { bottom: 2rem; right: 2.5rem; }
body.pos-bottom-left  #timer-display { bottom: 2rem; left: 2.5rem; }
body.pos-top-right    #timer-display { top: 2rem; right: 2.5rem; }
body.pos-top-left     #timer-display { top: 2rem; left: 2.5rem; }

/* ── CONTROLS ── */
#controls {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 20;
  padding: 1rem 1.5rem 1.5rem;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 1rem;
  transition: opacity 0.4s, transform 0.4s;
}
#controls.hidden { opacity: 0; transform: translateY(8px); pointer-events: none; }

.btn {
  background: rgba(255,255,255,0.07);
  border: 0.5px solid var(--border);
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 0.8rem;
  padding: 0.45rem 0.9rem;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.2s;
  white-space: nowrap;
}
.btn:hover { background: rgba(255,255,255,0.13); }
.btn.primary { background: var(--accent); color: #1a1a1a; border-color: transparent; font-weight: 500; }
.btn.primary:hover { background: #c4b599; }
.btn.danger { background: rgba(232,154,154,0.15); border-color: rgba(232,154,154,0.3); color: #e89a9a; }
.btn.active-mode { background: rgba(212,197,169,0.18); border-color: rgba(212,197,169,0.4); color: var(--accent); }

.ctrl-left, .ctrl-right { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }

/* ── SETUP SCREEN ── */
#setup {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  overflow-y: auto;
}
#setup.hidden { display: none; }

.setup-card {
  width: 100%;
  max-width: 580px;
  display: flex;
  flex-direction: column;
  gap: 1.4rem;
  padding: 0.5rem 0;
}

.setup-title { font-size: 1.1rem; font-weight: 500; color: var(--text); letter-spacing: 0.02em; }
.setup-sub   { font-size: 0.8rem; color: var(--muted); margin-top: 0.25rem; line-height: 1.5; }

.field { display: flex; flex-direction: column; gap: 0.5rem; }
.label { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }

.row { display: flex; gap: 0.5rem; flex-wrap: wrap; }

input[type="file"] { display: none; }

.file-drop {
  border: 1px dashed rgba(255,255,255,0.15);
  border-radius: 8px;
  padding: 1.8rem;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  font-size: 0.85rem;
  color: var(--muted);
}
.file-drop:hover, .file-drop.drag { border-color: var(--accent); background: rgba(212,197,169,0.05); }
.file-drop .count { color: var(--accent); font-weight: 500; font-size: 1rem; margin-top: 0.3rem; }

input[type="number"], input[type="text"], select {
  background: var(--surface);
  border: 0.5px solid var(--border);
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 0.85rem;
  padding: 0.5rem 0.7rem;
  border-radius: 6px;
  outline: none;
  width: 100%;
}
input[type="number"]:focus, select:focus { border-color: rgba(212,197,169,0.4); }

.seg { display: flex; gap: 0; }
.seg .btn { border-radius: 0; border-right-width: 0; font-size: 0.78rem; }
.seg .btn:first-child { border-radius: 6px 0 0 6px; }
.seg .btn:last-child  { border-radius: 0 6px 6px 0; border-right-width: 0.5px; }
.seg .btn.active { background: rgba(212,197,169,0.18); border-color: rgba(212,197,169,0.4); color: var(--accent); }

.time-inputs { display: flex; gap: 0.4rem; align-items: center; }
.time-inputs input { text-align: center; width: 56px; }
.time-sep { color: var(--muted); font-size: 1.1rem; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; }

/* ── SETTINGS PANEL ── */
#settings-panel {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 300px;
  z-index: 50;
  background: rgba(13,13,13,0.98);
  border-left: 0.5px solid var(--border);
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  overflow-y: auto;
}
#settings-panel.open { transform: translateX(0); }

.panel-title { font-size: 0.75rem; font-weight: 500; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
.panel-section-title { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: -0.4rem; }

.range-row { display: flex; gap: 0.6rem; align-items: center; }
.range-row input[type="range"] { flex: 1; accent-color: var(--accent); }
.range-val { font-size: 0.78rem; color: var(--muted); min-width: 36px; text-align: right; }

/* Color picker row */
.color-row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
.color-swatch {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.15);
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s;
  flex-shrink: 0;
}
.color-swatch:hover { transform: scale(1.15); border-color: rgba(255,255,255,0.4); }
.color-swatch.selected { border-color: white; transform: scale(1.1); }

input[type="color"] {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.2);
  background: none;
  cursor: pointer;
  padding: 0;
  overflow: hidden;
  flex-shrink: 0;
}
input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; border-radius: 50%; }
input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }

.hex-input {
  background: var(--surface);
  border: 0.5px solid var(--border);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  padding: 0.3rem 0.5rem;
  border-radius: 6px;
  outline: none;
  width: 88px;
}
.hex-input:focus { border-color: rgba(212,197,169,0.4); }

/* Font picker */
.font-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; }
.font-btn {
  background: var(--surface);
  border: 0.5px solid var(--border);
  color: var(--text);
  padding: 0.55rem 0.6rem;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  font-size: 0.95rem;
  text-align: center;
  line-height: 1;
}
.font-btn:hover { background: rgba(255,255,255,0.1); }
.font-btn.active { background: rgba(212,197,169,0.15); border-color: rgba(212,197,169,0.4); }
.font-btn small { display: block; font-size: 0.6rem; color: var(--muted); margin-top: 3px; font-family: var(--font-ui); letter-spacing: 0.04em; }

/* Overlay tint swatches */
.tint-grid { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.tint-btn {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.15);
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s;
}
.tint-btn:hover { transform: scale(1.15); }
.tint-btn.active { border-color: white; transform: scale(1.1); }

hr { border: none; border-top: 0.5px solid var(--border); }

/* ── PROGRESS BAR ── */
#progress { position: fixed; top: 0; left: 0; right: 0; height: 2px; z-index: 15; background: rgba(255,255,255,0.06); }
#progress-fill { height: 100%; background: var(--accent); transition: width 1s linear; width: 0%; }

/* ── PHOTO COUNTER ── */
#photo-info {
  position: fixed;
  top: 1rem; left: 1.5rem;
  z-index: 10;
  font-size: 0.7rem;
  color: rgba(255,255,255,0.3);
  font-family: 'JetBrains Mono', monospace;
  pointer-events: none;
  transition: opacity 0.4s;
}

/* ── PIP MODE ── */
#pip-container {
  display: none;
  position: fixed;
  bottom: 1rem; right: 1rem;
  z-index: 30;
  width: 280px; height: 180px;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  border: 0.5px solid rgba(255,255,255,0.12);
  cursor: move;
}
#pip-container.visible { display: block; }

#pip-video {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}

#pip-label {
  position: absolute;
  top: 6px; left: 8px;
  font-size: 0.6rem;
  color: rgba(255,255,255,0.5);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  pointer-events: none;
}

#pip-close {
  position: absolute;
  top: 6px; right: 8px;
  background: rgba(0,0,0,0.5);
  border: none;
  color: rgba(255,255,255,0.7);
  font-size: 0.8rem;
  width: 22px; height: 22px;
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
#pip-close:hover { background: rgba(0,0,0,0.8); color: white; }

/* ── CLOCK MODE ── */
#timer-display.clock-mode { letter-spacing: 0.02em; }

/* ── DONE OVERLAY ── */
#done-overlay {
  position: fixed; inset: 0;
  z-index: 80;
  background: rgba(0,0,0,0.8);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.5rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s;
}
#done-overlay.show { opacity: 1; pointer-events: all; }
#done-overlay h2 { font-size: 1.4rem; font-weight: 400; color: var(--text); }
#done-overlay p  { font-size: 0.85rem; color: var(--muted); }
</style>
</head>
<body class="pos-bottom-right transition-fade">

<!-- Setup Screen -->
<div id="setup">
  <div class="setup-card">
    <div>
      <div class="setup-title">Photo Flow Timer</div>
      <div class="setup-sub">写真をアップロードして、集中タイマーをスタートしましょう。</div>
    </div>

    <div class="field">
      <div class="label">写真を選ぶ</div>
      <label class="file-drop" id="drop-zone">
        <input type="file" id="file-input" multiple accept="image/*">
        <div>フォルダやファイルをここにドロップ</div>
        <div style="font-size:0.75rem;margin-top:0.3rem">または クリックして選択</div>
        <div class="count" id="file-count"></div>
      </label>
    </div>

    <!-- Timer mode toggle -->
    <div class="field">
      <div class="label">モード</div>
      <div class="seg" id="mode-seg">
        <button class="btn active" data-v="timer">⏱ カウントダウン</button>
        <button class="btn" data-v="clock">🕐 現在時刻</button>
      </div>
    </div>

    <div class="field" id="timer-setup-fields">
      <div class="label">タイマー時間</div>
      <div class="time-inputs">
        <input type="number" id="t-hours"   value="0"  min="0" max="23" placeholder="時">
        <span class="time-sep">:</span>
        <input type="number" id="t-minutes" value="25" min="0" max="59" placeholder="分">
        <span class="time-sep">:</span>
        <input type="number" id="t-seconds" value="0"  min="0" max="59" placeholder="秒">
      </div>
    </div>

    <div class="grid2">
      <div class="field">
        <div class="label">写真の切替（秒）</div>
        <input type="number" id="interval-input" value="8" min="3" max="60">
      </div>
      <div class="field">
        <div class="label">演出</div>
        <select id="transition-select">
          <option value="fade">フェード</option>
          <option value="slide">スライド</option>
          <option value="river">リバー（川）</option>
        </select>
      </div>
      <div class="field">
        <div class="label">表示スタイル</div>
        <select id="display-select">
          <option value="">全画面</option>
          <option value="framed">フレーム</option>
        </select>
      </div>
      <div class="field">
        <div class="label">タイマー位置</div>
        <select id="pos-select">
          <option value="pos-bottom-right">右下</option>
          <option value="pos-bottom-left">左下</option>
          <option value="pos-top-right">右上</option>
          <option value="pos-top-left">左上</option>
          <option value="pos-center">中央</option>
        </select>
      </div>
    </div>

    <div class="field" id="sound-setup-field">
      <div class="label">タイマー音</div>
      <div class="seg" id="sound-seg">
        <button class="btn active" data-v="end-only">終了のみ</button>
        <button class="btn" data-v="countdown">残り10秒カウント</button>
        <button class="btn" data-v="none">なし</button>
      </div>
    </div>

    <button class="btn primary" id="start-btn" onclick="startSession()">スタート →</button>
  </div>
</div>

<!-- Photo Canvas -->
<div id="photo-canvas">
  <div class="photo-slot" id="slot-a"></div>
  <div class="photo-slot" id="slot-b"></div>
</div>

<!-- Photo dim/tint overlay -->
<div id="photo-overlay"></div>

<!-- Bottom gradient -->
<div id="gradient-overlay"></div>

<!-- Progress bar -->
<div id="progress"><div id="progress-fill"></div></div>

<!-- Photo counter -->
<div id="photo-info"></div>

<!-- Timer Display -->
<div id="timer-display font-mono">00:00</div>

<!-- PiP Container -->
<div id="pip-container">
  <video id="pip-video" autoplay muted playsinline></video>
  <div id="pip-label">PiP</div>
  <button id="pip-close" onclick="closePip()">✕</button>
</div>

<!-- Bottom Controls -->
<div id="controls" class="hidden">
  <div class="ctrl-left">
    <button class="btn" onclick="togglePause()" id="pause-btn">一時停止</button>
    <button class="btn" onclick="skipPhoto()">次の写真 →</button>
    <button class="btn" onclick="togglePip()" id="pip-btn">PiP</button>
  </div>
  <div class="ctrl-right">
    <button class="btn" onclick="toggleClockMode()" id="clock-btn">時刻表示</button>
    <button class="btn" onclick="openSettings()">⚙ 設定</button>
    <button class="btn danger" onclick="resetAll()">終了</button>
  </div>
</div>

<!-- Settings Panel -->
<div id="settings-panel">
  <div class="panel-title">設定</div>

  <!-- Timer font -->
  <div class="field">
    <div class="label">タイマーフォント</div>
    <div class="font-grid" id="font-grid">
      <button class="font-btn active" data-font="font-mono" onclick="setFont(this)" style="font-family:'JetBrains Mono'">00:00<small>Mono</small></button>
      <button class="font-btn" data-font="font-space" onclick="setFont(this)" style="font-family:'Space Mono'">00:00<small>Space</small></button>
      <button class="font-btn" data-font="font-bebas" onclick="setFont(this)" style="font-family:'Bebas Neue';font-size:1.25rem">00:00<small>Bebas</small></button>
      <button class="font-btn" data-font="font-playfair" onclick="setFont(this)" style="font-family:'Playfair Display'">00:00<small>Playfair</small></button>
      <button class="font-btn" data-font="font-oswald" onclick="setFont(this)" style="font-family:'Oswald';font-weight:300;letter-spacing:0.08em">00:00<small>Oswald</small></button>
      <button class="font-btn" data-font="font-dm-serif" onclick="setFont(this)" style="font-family:'DM Serif Display'">00:00<small>DM Serif</small></button>
      <button class="font-btn" data-font="font-rajdhani" onclick="setFont(this)" style="font-family:'Rajdhani';font-weight:300;letter-spacing:0.1em">00:00<small>Rajdhani</small></button>
    </div>
  </div>

  <hr>

  <!-- Timer color -->
  <div class="field">
    <div class="label">タイマーカラー</div>
    <div class="color-row" id="color-swatches">
      <div class="color-swatch selected" style="background:#e8e8e8" data-color="#e8e8e8" onclick="pickSwatch(this)"></div>
      <div class="color-swatch" style="background:#d4c5a9" data-color="#d4c5a9" onclick="pickSwatch(this)"></div>
      <div class="color-swatch" style="background:#a9c4d4" data-color="#a9c4d4" onclick="pickSwatch(this)"></div>
      <div class="color-swatch" style="background:#a9d4b5" data-color="#a9d4b5" onclick="pickSwatch(this)"></div>
      <div class="color-swatch" style="background:#d4a9c4" data-color="#d4a9c4" onclick="pickSwatch(this)"></div>
      <div class="color-swatch" style="background:#f5f0e8" data-color="#f5f0e8" onclick="pickSwatch(this)"></div>
      <input type="color" id="color-picker" value="#e8e8e8" oninput="colorFromPicker(this.value)" title="カスタムカラー">
    </div>
    <div style="display:flex;gap:0.4rem;align-items:center;margin-top:0.3rem">
      <span style="font-size:0.72rem;color:var(--muted)">#</span>
      <input class="hex-input" id="hex-input" value="e8e8e8" maxlength="6" oninput="colorFromHex(this.value)" placeholder="e8e8e8">
    </div>
  </div>

  <hr>

  <!-- Timer size & opacity -->
  <div class="field">
    <div class="label">フォントサイズ</div>
    <div class="range-row">
      <input type="range" min="2" max="12" step="0.5" value="5" id="font-size-range" oninput="updateFontSize(this.value)">
      <span class="range-val" id="font-size-val">5rem</span>
    </div>
  </div>

  <div class="field">
    <div class="label">タイマー透明度</div>
    <div class="range-row">
      <input type="range" min="0.1" max="1" step="0.05" value="1" id="timer-opacity-range" oninput="updateTimerOpacity(this.value)">
      <span class="range-val" id="timer-opacity-val">100%</span>
    </div>
  </div>

  <hr>

  <!-- Photo overlay -->
  <div class="field">
    <div class="label">写真の暗さ（オーバーレイ）</div>
    <div class="range-row">
      <input type="range" min="0" max="0.85" step="0.05" value="0.35" id="overlay-range" oninput="updateOverlay(this.value)">
      <span class="range-val" id="overlay-val">35%</span>
    </div>
    <div class="label" style="margin-top:0.5rem">色</div>
    <div class="tint-grid" id="tint-grid">
      <div class="tint-btn active" style="background:#000" data-tint="0,0,0"          onclick="setTint(this)"></div>
      <div class="tint-btn"        style="background:#1a0a0a" data-tint="40,10,10"    onclick="setTint(this)"></div>
      <div class="tint-btn"        style="background:#0a0a1a" data-tint="10,10,40"    onclick="setTint(this)"></div>
      <div class="tint-btn"        style="background:#0a1a0a" data-tint="10,40,10"    onclick="setTint(this)"></div>
      <div class="tint-btn"        style="background:#1a1208" data-tint="40,30,8"     onclick="setTint(this)"></div>
      <div class="tint-btn"        style="background:#0d0d0d" data-tint="13,13,13"    onclick="setTint(this)"></div>
      <div class="tint-btn"        style="background:#fff"    data-tint="255,255,255" onclick="setTint(this)" style="border-color:rgba(0,0,0,0.3)"></div>
    </div>
  </div>

  <hr>

  <!-- Layout -->
  <div class="field">
    <div class="label">演出</div>
    <select id="transition-live" onchange="setTransition(this.value)">
      <option value="fade">フェード</option>
      <option value="slide">スライド</option>
      <option value="river">リバー（川）</option>
    </select>
  </div>
  <div class="field">
    <div class="label">写真の切替（秒）</div>
    <input type="number" min="3" max="60" value="8" id="interval-live" onchange="updateInterval(this.value)">
  </div>
  <div class="field">
    <div class="label">表示スタイル</div>
    <select id="display-live" onchange="setDisplayStyle(this.value)">
      <option value="">全画面</option>
      <option value="framed">フレーム</option>
    </select>
  </div>
  <div class="field">
    <div class="label">タイマー位置</div>
    <select id="pos-live" onchange="setPos(this.value)">
      <option value="pos-bottom-right">右下</option>
      <option value="pos-bottom-left">左下</option>
      <option value="pos-top-right">右上</option>
      <option value="pos-top-left">左上</option>
      <option value="pos-center">中央</option>
    </select>
  </div>
  <div class="field">
    <div class="label">タイマー音</div>
    <div class="seg" id="sound-seg-live">
      <button class="btn active" data-v="end-only">終了のみ</button>
      <button class="btn" data-v="countdown">カウント</button>
      <button class="btn" data-v="none">なし</button>
    </div>
  </div>

  <hr>
  <button class="btn" onclick="closeSettings()">閉じる</button>
</div>

<!-- Done Overlay -->
<div id="done-overlay">
  <h2>⏱ タイマー終了</h2>
  <p>集中お疲れさまでした。</p>
  <div style="display:flex;gap:0.75rem">
    <button class="btn primary" onclick="resetAll()">最初から</button>
    <button class="btn" onclick="closeDone()">続ける</button>
  </div>
</div>

<script>
// ── Audio ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAudio() { if (!audioCtx) audioCtx = new AudioCtx(); return audioCtx; }
function beep(freq=880, dur=0.12, vol=0.4, delay=0) {
  const ctx = getAudio();
  const osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.frequency.value = freq; osc.type = 'sine';
  const t = ctx.currentTime + delay;
  gain.gain.setValueAtTime(0,t);
  gain.gain.linearRampToValueAtTime(vol, t+0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, t+dur);
  osc.start(t); osc.stop(t+dur+0.05);
}
function doneSound() { beep(523,.15,.5,0); beep(659,.15,.5,.18); beep(784,.25,.5,.36); }
function tickSound() { beep(440,.05,.25); }

// ── State ──
let photos = [];
let photoIndex = 0;
let totalSeconds = 0;
let remainingSeconds = 0;
let timerInterval = null;
let photoInterval = null;
let clockInterval = null;
let isPaused = false;
let soundMode = 'end-only';
let currentSlot = 'a';
let usedIndices = [];
let appMode = 'timer';      // 'timer' | 'clock'
let clockModeActive = false;
let timerColorOverride = null; // user-chosen color, disables warning colors
let currentFont = 'font-mono';

// ── File Input ──
const fileInput = document.getElementById('file-input');
const dropZone  = document.getElementById('drop-zone');
const fileCount = document.getElementById('file-count');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag');
  loadFiles([...e.dataTransfer.files]);
});
fileInput.addEventListener('change', () => loadFiles([...fileInput.files]));

function loadFiles(files) {
  const imgs = files.filter(f => f.type.startsWith('image/'));
  if (!imgs.length) return;
  photos = imgs.map(f => URL.createObjectURL(f));
  fileCount.textContent = `${photos.length} 枚の写真を読み込みました`;
}

// ── Mode toggle (setup) ──
document.getElementById('mode-seg').querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('mode-seg').querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    appMode = btn.dataset.v;
    document.getElementById('timer-setup-fields').style.display = appMode === 'clock' ? 'none' : '';
    document.getElementById('sound-setup-field').style.display  = appMode === 'clock' ? 'none' : '';
  });
});

// ── Segmented buttons ──
document.querySelectorAll('.seg').forEach(seg => {
  seg.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('click', () => {
      seg.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (seg.id === 'sound-seg' || seg.id === 'sound-seg-live') soundMode = btn.dataset.v;
    });
  });
});

// ── Start ──
function startSession() {
  if (!photos.length) { alert('写真を選んでください。'); return; }

  if (appMode === 'timer') {
    const h = parseInt(document.getElementById('t-hours').value)   || 0;
    const m = parseInt(document.getElementById('t-minutes').value) || 0;
    const s = parseInt(document.getElementById('t-seconds').value) || 0;
    totalSeconds = h * 3600 + m * 60 + s;
    if (totalSeconds <= 0) { alert('タイマーの時間を設定してください。'); return; }
  }

  const interval = parseInt(document.getElementById('interval-input').value) || 8;
  document.getElementById('interval-live').value = interval;

  setTransition(document.getElementById('transition-select').value);
  setDisplayStyle(document.getElementById('display-select').value);
  setPos(document.getElementById('pos-select').value);

  document.getElementById('setup').classList.add('hidden');
  document.getElementById('controls').classList.remove('hidden');

  remainingSeconds = totalSeconds;
  isPaused = false;
  usedIndices = [];
  clockModeActive = (appMode === 'clock');

  updateClockBtn();
  showNextPhoto();
  startPhotoLoop(interval);

  if (clockModeActive) {
    startClockMode();
  } else {
    updateTimerDisplay();
    startCountdown();
  }
}

// ── Countdown ──
function startCountdown() {
  clearInterval(timerInterval);
  clearInterval(clockInterval);
  timerInterval = setInterval(() => {
    if (isPaused) return;
    remainingSeconds--;
    updateTimerDisplay();
    updateProgress();
    if (soundMode === 'countdown' && remainingSeconds <= 10 && remainingSeconds > 0) tickSound();
    if (remainingSeconds <= 0) {
      clearInterval(timerInterval);
      clearInterval(photoInterval);
      if (soundMode !== 'none') doneSound();
      document.getElementById('done-overlay').classList.add('show');
    }
  }, 1000);
}

function updateTimerDisplay() {
  const disp = document.getElementById('timer-display');
  const h = Math.floor(remainingSeconds / 3600);
  const m = Math.floor((remainingSeconds % 3600) / 60);
  const s = remainingSeconds % 60;
  disp.textContent = h > 0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
  // Apply warning colors only when user hasn't set a custom color
  if (!timerColorOverride) {
    disp.classList.remove('warning','urgent');
    if (remainingSeconds <= 60) disp.classList.add('warning');
    if (remainingSeconds <= 10) disp.classList.add('urgent');
  }
}

function pad(n) { return String(n).padStart(2,'0'); }

function updateProgress() {
  const pct = ((totalSeconds - remainingSeconds) / totalSeconds) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ── Clock mode ──
function startClockMode() {
  clearInterval(timerInterval);
  clearInterval(clockInterval);
  document.getElementById('progress-fill').style.width = '0%';
  renderClock();
  clockInterval = setInterval(renderClock, 1000);
}

function renderClock() {
  const now = new Date();
  const h = pad(now.getHours());
  const m = pad(now.getMinutes());
  const s = pad(now.getSeconds());
  const disp = document.getElementById('timer-display');
  disp.textContent = `${h}:${m}:${s}`;
  if (!timerColorOverride) {
    disp.classList.remove('warning','urgent');
  }
}

function toggleClockMode() {
  clockModeActive = !clockModeActive;
  if (clockModeActive) {
    startClockMode();
  } else {
    clearInterval(clockInterval);
    if (appMode === 'timer') {
      updateTimerDisplay();
      startCountdown();
    }
  }
  updateClockBtn();
}

function updateClockBtn() {
  const btn = document.getElementById('clock-btn');
  btn.textContent = clockModeActive ? '⏱ タイマーへ' : '🕐 時刻表示';
  btn.classList.toggle('active-mode', clockModeActive);
}

// ── Font ──
function setFont(btn) {
  document.querySelectorAll('#font-grid .font-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const disp = document.getElementById('timer-display');
  disp.classList.remove('font-mono','font-space','font-bebas','font-playfair','font-oswald','font-dm-serif','font-rajdhani');
  currentFont = btn.dataset.font;
  disp.classList.add(currentFont);
}

// ── Timer Color ──
function pickSwatch(el) {
  document.querySelectorAll('#color-swatches .color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  applyTimerColor(el.dataset.color);
  document.getElementById('color-picker').value = el.dataset.color;
  document.getElementById('hex-input').value = el.dataset.color.replace('#','');
}

function colorFromPicker(val) {
  document.querySelectorAll('#color-swatches .color-swatch').forEach(s => s.classList.remove('selected'));
  applyTimerColor(val);
  document.getElementById('hex-input').value = val.replace('#','');
}

function colorFromHex(val) {
  const clean = val.replace(/[^0-9a-fA-F]/g,'');
  if (clean.length === 6) {
    const hex = '#' + clean;
    document.querySelectorAll('#color-swatches .color-swatch').forEach(s => s.classList.remove('selected'));
    applyTimerColor(hex);
    document.getElementById('color-picker').value = hex;
  }
}

function applyTimerColor(hex) {
  const disp = document.getElementById('timer-display');
  disp.style.color = hex;
  disp.classList.remove('warning','urgent');
  timerColorOverride = hex;
}

// ── Timer Size & Opacity ──
function updateFontSize(v) {
  document.documentElement.style.setProperty('--timer-size', v + 'rem');
  document.getElementById('font-size-val').textContent = v + 'rem';
}

function updateTimerOpacity(v) {
  document.getElementById('timer-display').style.opacity = v;
  document.getElementById('timer-opacity-val').textContent = Math.round(v * 100) + '%';
}

// ── Photo overlay (dim/tint) ──
function updateOverlay(v) {
  document.documentElement.style.setProperty('--overlay-opacity', v);
  document.getElementById('overlay-val').textContent = Math.round(v * 100) + '%';
}

function setTint(btn) {
  document.querySelectorAll('#tint-grid .tint-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.documentElement.style.setProperty('--overlay-color', btn.dataset.tint);
}

// ── Transitions & Layout ──
function setTransition(v) {
  document.body.classList.remove('transition-fade','transition-slide','transition-river');
  document.body.classList.add('transition-' + v);
}
function setDisplayStyle(v) {
  document.body.classList.remove('framed');
  if (v === 'framed') document.body.classList.add('framed');
}
function setPos(v) {
  document.body.classList.remove('pos-center','pos-bottom-right','pos-bottom-left','pos-top-right','pos-top-left');
  document.body.classList.add(v);
}
function updateInterval(v) {
  clearInterval(photoInterval);
  startPhotoLoop(parseInt(v));
}

// ── Photo Logic ──
function pickNextIndex() {
  if (usedIndices.length >= photos.length) usedIndices = [];
  const available = photos.map((_,i) => i).filter(i => !usedIndices.includes(i));
  const idx = available[Math.floor(Math.random() * available.length)];
  usedIndices.push(idx);
  return idx;
}

function showNextPhoto() {
  const idx = pickNextIndex();
  const nextSlot = currentSlot === 'a' ? 'b' : 'a';
  const slotEl = document.getElementById('slot-' + nextSlot);
  const oldEl  = document.getElementById('slot-' + currentSlot);
  slotEl.style.backgroundImage = `url("${photos[idx]}")`;
  slotEl.classList.remove('leaving','active');
  void slotEl.offsetWidth;
  oldEl.classList.remove('active');
  oldEl.classList.add('leaving');
  slotEl.classList.add('active');
  setTimeout(() => { oldEl.classList.remove('leaving'); }, 1500);
  currentSlot = nextSlot;
  photoIndex = usedIndices.length;
  document.getElementById('photo-info').textContent = `${photoIndex} / ${photos.length}`;
}

function startPhotoLoop(interval) {
  clearInterval(photoInterval);
  photoInterval = setInterval(() => { if (!isPaused) showNextPhoto(); }, interval * 1000);
}

function skipPhoto() {
  showNextPhoto();
  clearInterval(photoInterval);
  const interval = parseInt(document.getElementById('interval-live').value) || 8;
  startPhotoLoop(interval);
}

// ── Pause ──
function togglePause() {
  isPaused = !isPaused;
  document.getElementById('pause-btn').textContent = isPaused ? '再開' : '一時停止';
}

// ── PiP ──
let pipStream = null;
async function togglePip() {
  const container = document.getElementById('pip-container');
  if (container.classList.contains('visible')) {
    closePip();
    return;
  }
  try {
    pipStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
    const video = document.getElementById('pip-video');
    video.srcObject = pipStream;
    container.classList.add('visible');
    document.getElementById('pip-btn').classList.add('active-mode');
    pipStream.getVideoTracks()[0].addEventListener('ended', closePip);
    makeDraggable(container);
  } catch(e) {
    if (e.name !== 'NotAllowedError') alert('PiPの起動に失敗しました: ' + e.message);
  }
}

function closePip() {
  if (pipStream) { pipStream.getTracks().forEach(t => t.stop()); pipStream = null; }
  document.getElementById('pip-video').srcObject = null;
  document.getElementById('pip-container').classList.remove('visible');
  document.getElementById('pip-btn').classList.remove('active-mode');
}

function makeDraggable(el) {
  let ox=0, oy=0, startX=0, startY=0;
  el.addEventListener('mousedown', e => {
    if (e.target.id === 'pip-close') return;
    startX = e.clientX; startY = e.clientY;
    ox = el.offsetLeft; oy = el.offsetTop;
    function onMove(e) {
      el.style.right = 'auto'; el.style.bottom = 'auto';
      el.style.left = (ox + e.clientX - startX) + 'px';
      el.style.top  = (oy + e.clientY - startY) + 'px';
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

// ── Settings panel ──
function openSettings()  { document.getElementById('settings-panel').classList.add('open'); }
function closeSettings() { document.getElementById('settings-panel').classList.remove('open'); }

// ── Controls auto-hide ──
let hideTimeout;
document.addEventListener('mousemove', () => {
  const c = document.getElementById('controls');
  c.classList.remove('hidden');
  clearTimeout(hideTimeout);
  if (!document.getElementById('settings-panel').classList.contains('open')) {
    hideTimeout = setTimeout(() => c.classList.add('hidden'), 3000);
  }
});

// ── Done / Reset ──
function closeDone() { document.getElementById('done-overlay').classList.remove('show'); }

function resetAll() {
  clearInterval(timerInterval);
  clearInterval(photoInterval);
  clearInterval(clockInterval);
  closePip();
  document.getElementById('done-overlay').classList.remove('show');
  document.getElementById('controls').classList.add('hidden');
  document.getElementById('setup').classList.remove('hidden');
  ['slot-a','slot-b'].forEach(id => {
    const el = document.getElementById(id);
    el.style.backgroundImage = '';
    el.className = 'photo-slot';
  });
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('timer-display').textContent = '00:00';
  document.getElementById('timer-display').classList.remove('warning','urgent');
  isPaused = false;
  clockModeActive = false;
  remainingSeconds = 0;
  updateClockBtn();
}

// init timer display class
document.getElementById('timer-display').classList.add('font-mono');
</script>
</body>
</html>
