<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Flow Timer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&family=Space+Mono:wght@400;700&family=Bebas+Neue&family=Playfair+Display:wght@400;700&family=Oswald:wght@300;400&family=DM+Serif+Display&family=Rajdhani:wght@300;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f0f;
  --surface: #1c1c1c;
  --border: rgba(255,255,255,0.08);
  --text: #e8e8e8;
  --muted: #777;
  --accent: #d4c5a9;
  --font-ui: 'Inter', sans-serif;
  --timer-size: 5rem;
  --overlay-color: 0,0,0;
  --overlay-opacity: 0.35;
  --transition-duration: 1.2s;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  min-height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* ─── PHOTO CANVAS ─── */
#photo-canvas { position: fixed; inset: 0; z-index: 0; }
.photo-slot {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  opacity: 0;
}
body.framed .photo-slot { inset: 40px; border-radius: 6px; }

/* Transitions */
body.transition-fade .photo-slot.active  { opacity:1; transition:opacity var(--transition-duration) ease; }
body.transition-fade .photo-slot.leaving { opacity:0; transition:opacity var(--transition-duration) ease; }

body.transition-slide .photo-slot { transform:translateX(100%); transition:transform var(--transition-duration) cubic-bezier(.4,0,.2,1),opacity 0s; }
body.transition-slide .photo-slot.active  { opacity:1; transform:translateX(0); }
body.transition-slide .photo-slot.leaving { opacity:1; transform:translateX(-100%); transition:transform var(--transition-duration) cubic-bezier(.4,0,.2,1); }

body.transition-river .photo-slot { opacity:0; background-size:130%; background-position:120% center; transition:background-position calc(var(--transition-duration)*8) linear, opacity var(--transition-duration) ease; }
body.transition-river .photo-slot.active  { opacity:1; background-position:50% center; }
body.transition-river .photo-slot.leaving { opacity:0; transition:opacity var(--transition-duration) ease; }

/* ─── OVERLAYS ─── */
#photo-overlay {
  position:fixed; inset:0; z-index:1;
  background: rgba(var(--overlay-color), var(--overlay-opacity));
  pointer-events:none;
}
#gradient-overlay {
  position:fixed; inset:0; z-index:2;
  background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 45%);
  pointer-events:none;
}

/* ─── TIMER ─── */
#timer-display {
  position: fixed;
  z-index: 10;
  font-size: var(--timer-size);
  font-weight: 400;
  color: #e8e8e8;
  line-height: 1;
  pointer-events: none;
  text-shadow: 0 2px 16px rgba(0,0,0,0.6);
  /* font set by class below */
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: -0.02em;
}
.font-mono     { font-family:'JetBrains Mono',monospace !important; font-weight:400; letter-spacing:-0.02em !important; }
.font-space    { font-family:'Space Mono',monospace !important;     font-weight:400; letter-spacing:-0.03em !important; }
.font-bebas    { font-family:'Bebas Neue',sans-serif !important;    font-weight:400; letter-spacing:0.06em !important; }
.font-playfair { font-family:'Playfair Display',serif !important;   font-weight:400; letter-spacing:0.01em !important; }
.font-oswald   { font-family:'Oswald',sans-serif !important;        font-weight:300; letter-spacing:0.09em !important; }
.font-dm       { font-family:'DM Serif Display',serif !important;   font-weight:400; letter-spacing:0em !important; }
.font-rajdhani { font-family:'Rajdhani',sans-serif !important;      font-weight:300; letter-spacing:0.14em !important; }

#timer-display.warning { color: #e8c99a !important; }
#timer-display.urgent  { color: #e89a9a !important; }

body.pos-center       #timer-display { top:50%;  left:50%;  transform:translate(-50%,-50%); text-align:center; }
body.pos-bottom-right #timer-display { bottom:2rem; right:2.5rem; }
body.pos-bottom-left  #timer-display { bottom:2rem; left:2.5rem; }
body.pos-top-right    #timer-display { top:2rem;    right:2.5rem; }
body.pos-top-left     #timer-display { top:2rem;    left:2.5rem; }

/* ─── PROGRESS ─── */
#progress { position:fixed; top:0; left:0; right:0; height:2px; z-index:15; background:rgba(255,255,255,0.06); }
#progress-fill { height:100%; background:var(--accent); width:0%; transition:width 1s linear; }

/* ─── PHOTO COUNTER ─── */
#photo-info {
  position:fixed; top:1rem; left:1.5rem; z-index:10;
  font-size:0.68rem; color:rgba(255,255,255,0.28);
  font-family:'JetBrains Mono',monospace;
  pointer-events:none;
}

/* ─── CONTROLS ─── */
#controls {
  position:fixed; bottom:0; left:0; right:0; z-index:20;
  padding:1rem 1.5rem 1.6rem;
  display:flex; align-items:flex-end; justify-content:space-between; gap:0.75rem;
  transition:opacity 0.4s, transform 0.4s;
}
#controls.hidden { opacity:0; transform:translateY(10px); pointer-events:none; }

.ctrl-group { display:flex; gap:0.4rem; align-items:center; flex-wrap:wrap; }

/* ─── BUTTONS ─── */
.btn {
  background: rgba(255,255,255,0.07);
  border: 0.5px solid rgba(255,255,255,0.1);
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 0.78rem;
  padding: 0.42rem 0.85rem;
  border-radius: 7px;
  cursor: pointer;
  transition: background 0.18s;
  white-space: nowrap;
  display:inline-flex; align-items:center; gap:0.35rem;
}
.btn svg { flex-shrink:0; }
.btn:hover { background:rgba(255,255,255,0.13); }
.btn.primary { background:var(--accent); color:#1a1a1a; border-color:transparent; font-weight:500; }
.btn.primary:hover { background:#c4b599; }
.btn.danger  { background:rgba(232,154,154,0.13); border-color:rgba(232,154,154,0.28); color:#e89a9a; }
.btn.on      { background:rgba(212,197,169,0.17); border-color:rgba(212,197,169,0.38); color:var(--accent); }

/* ─── SETUP ─── */
#setup {
  position:fixed; inset:0; z-index:100;
  background:var(--bg);
  display:flex; align-items:center; justify-content:center;
  padding:2rem; overflow-y:auto;
}
#setup.hidden { display:none; }

.setup-card {
  width:100%; max-width:560px;
  display:flex; flex-direction:column; gap:1.4rem;
  padding:0.5rem 0;
}
.setup-title { font-size:1.05rem; font-weight:500; letter-spacing:0.01em; }
.setup-sub   { font-size:0.78rem; color:var(--muted); margin-top:0.2rem; line-height:1.5; }

.field { display:flex; flex-direction:column; gap:0.5rem; }
.label { font-size:0.68rem; color:var(--muted); letter-spacing:0.07em; text-transform:uppercase; }

input[type="file"] { display:none; }
.file-drop {
  border:1px dashed rgba(255,255,255,0.13);
  border-radius:8px; padding:1.7rem;
  text-align:center; cursor:pointer;
  font-size:0.83rem; color:var(--muted);
  transition:border-color 0.2s, background 0.2s;
}
.file-drop:hover,.file-drop.drag { border-color:var(--accent); background:rgba(212,197,169,0.04); }
.file-drop .count { color:var(--accent); font-weight:500; font-size:0.95rem; margin-top:0.35rem; }

input[type="number"], input[type="text"], select {
  background:var(--surface); border:0.5px solid var(--border);
  color:var(--text); font-family:var(--font-ui); font-size:0.83rem;
  padding:0.5rem 0.65rem; border-radius:6px; outline:none; width:100%;
}
input[type="number"]:focus, select:focus { border-color:rgba(212,197,169,0.4); }

.seg { display:flex; }
.seg .btn { border-radius:0; border-right-width:0; font-size:0.75rem; }
.seg .btn:first-child { border-radius:6px 0 0 6px; }
.seg .btn:last-child  { border-radius:0 6px 6px 0; border-right-width:0.5px; }
.seg .btn.active { background:rgba(212,197,169,0.16); border-color:rgba(212,197,169,0.38); color:var(--accent); }

.time-row { display:flex; gap:0.4rem; align-items:center; }
.time-row input { text-align:center; width:56px; }
.time-sep { color:var(--muted); font-size:1.05rem; }

.g2 { display:grid; grid-template-columns:1fr 1fr; gap:0.7rem; }

/* ─── SETTINGS PANEL ─── */
#settings-panel {
  position:fixed; top:0; right:0; bottom:0;
  width:296px; z-index:50;
  background:rgba(12,12,12,0.98);
  border-left:0.5px solid var(--border);
  padding:1.4rem; display:flex; flex-direction:column; gap:1.1rem;
  transform:translateX(100%); transition:transform 0.33s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;
}
#settings-panel.open { transform:translateX(0); }
.panel-hd { font-size:0.7rem; font-weight:600; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; }

.range-row { display:flex; gap:0.5rem; align-items:center; }
.range-row input[type="range"] { flex:1; accent-color:var(--accent); }
.range-val { font-size:0.74rem; color:var(--muted); min-width:34px; text-align:right; }

/* Color picker */
.color-bar { display:flex; gap:0.45rem; align-items:center; flex-wrap:wrap; }
.swatch {
  width:24px; height:24px; border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.14);
  cursor:pointer; flex-shrink:0;
  transition:transform 0.13s, border-color 0.13s;
}
.swatch:hover { transform:scale(1.18); }
.swatch.on    { border-color:#fff; transform:scale(1.12); }

/* the color wheel button */
.color-wheel-wrap {
  width:24px; height:24px; border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.2);
  overflow:hidden; cursor:pointer; flex-shrink:0;
  position:relative;
  background: conic-gradient(red,yellow,lime,cyan,blue,magenta,red);
  transition:transform 0.13s;
}
.color-wheel-wrap:hover { transform:scale(1.18); }
.color-wheel-wrap input[type="color"] {
  position:absolute; inset:0; width:100%; height:100%;
  opacity:0; cursor:pointer; border:none; padding:0;
}

.hex-row { display:flex; align-items:center; gap:0.35rem; margin-top:0.25rem; }
.hex-row span { font-size:0.7rem; color:var(--muted); }
.hex-input {
  background:var(--surface); border:0.5px solid var(--border);
  color:var(--text); font-family:'JetBrains Mono',monospace;
  font-size:0.76rem; padding:0.28rem 0.5rem; border-radius:5px;
  outline:none; width:84px;
}
.hex-input:focus { border-color:rgba(212,197,169,0.4); }

/* Font grid */
.font-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.38rem; }
.font-btn {
  background:var(--surface); border:0.5px solid var(--border);
  color:var(--text); padding:0.5rem 0.4rem; border-radius:6px;
  cursor:pointer; text-align:center; line-height:1;
  font-size:0.9rem; transition:background 0.13s, border-color 0.13s;
}
.font-btn:hover { background:rgba(255,255,255,0.09); }
.font-btn.on { background:rgba(212,197,169,0.14); border-color:rgba(212,197,169,0.38); }
.font-btn small { display:block; font-size:0.57rem; color:var(--muted); margin-top:3px; font-family:var(--font-ui); }

/* Tint swatches */
.tint-bar { display:flex; gap:0.4rem; flex-wrap:wrap; }
.tint-dot {
  width:24px; height:24px; border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.13);
  cursor:pointer; transition:transform 0.13s, border-color 0.13s;
}
.tint-dot:hover { transform:scale(1.18); }
.tint-dot.on    { border-color:#fff; transform:scale(1.12); }

hr { border:none; border-top:0.5px solid var(--border); }

/* ─── PiP WINDOW (Document PiP) ─── */
/* Styles injected into PiP window from JS, no element here */

/* ─── DONE ─── */
#done-overlay {
  position:fixed; inset:0; z-index:80;
  background:rgba(0,0,0,0.82);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.4rem;
  opacity:0; pointer-events:none; transition:opacity 0.45s;
}
#done-overlay.show { opacity:1; pointer-events:all; }
#done-overlay h2 { font-size:1.35rem; font-weight:400; }
#done-overlay p  { font-size:0.82rem; color:var(--muted); }
</style>
</head>
<body class="pos-bottom-right transition-fade">

<!-- ── SETUP ── -->
<div id="setup">
  <div class="setup-card">
    <div>
      <div class="setup-title">Photo Flow Timer</div>
      <div class="setup-sub">写真をアップロードして集中タイマーをスタート。</div>
    </div>

    <div class="field">
      <div class="label">写真を選ぶ</div>
      <label class="file-drop" id="drop-zone">
        <input type="file" id="file-input" multiple accept="image/*">
        <div>フォルダやファイルをここにドロップ</div>
        <div style="font-size:0.73rem;margin-top:0.25rem">またはクリックして選択</div>
        <div class="count" id="file-count"></div>
      </label>
    </div>

    <div class="field">
      <div class="label">モード</div>
      <div class="seg" id="mode-seg">
        <button class="btn active" data-v="timer">⏱ カウントダウン</button>
        <button class="btn" data-v="clock">🕐 現在時刻</button>
      </div>
    </div>

    <div class="field" id="timer-setup-fields">
      <div class="label">タイマー時間</div>
      <div class="time-row">
        <input type="number" id="t-hours"   value="0"  min="0" max="23" placeholder="時">
        <span class="time-sep">:</span>
        <input type="number" id="t-minutes" value="25" min="0" max="59" placeholder="分">
        <span class="time-sep">:</span>
        <input type="number" id="t-seconds" value="0"  min="0" max="59" placeholder="秒">
      </div>
    </div>

    <div class="g2">
      <div class="field">
        <div class="label">写真の切替（秒）</div>
        <input type="number" id="interval-input" value="8" min="3" max="60">
      </div>
      <div class="field">
        <div class="label">演出</div>
        <select id="transition-select">
          <option value="fade">フェード</option>
          <option value="slide">スライド</option>
          <option value="river">リバー</option>
        </select>
      </div>
      <div class="field">
        <div class="label">表示スタイル</div>
        <select id="display-select">
          <option value="">全画面</option>
          <option value="framed">フレーム</option>
        </select>
      </div>
      <div class="field">
        <div class="label">タイマー位置</div>
        <select id="pos-select">
          <option value="pos-bottom-right">右下</option>
          <option value="pos-bottom-left">左下</option>
          <option value="pos-top-right">右上</option>
          <option value="pos-top-left">左上</option>
          <option value="pos-center">中央</option>
        </select>
      </div>
    </div>

    <div class="field" id="sound-setup-field">
      <div class="label">タイマー音</div>
      <div class="seg" id="sound-seg">
        <button class="btn active" data-v="end-only">終了のみ</button>
        <button class="btn" data-v="countdown">残り10秒カウント</button>
        <button class="btn" data-v="none">なし</button>
      </div>
    </div>

    <button class="btn primary" onclick="startSession()">スタート →</button>
  </div>
</div>

<!-- ── PHOTO CANVAS ── -->
<div id="photo-canvas">
  <div class="photo-slot" id="slot-a"></div>
  <div class="photo-slot" id="slot-b"></div>
</div>
<div id="photo-overlay"></div>
<div id="gradient-overlay"></div>
<div id="progress"><div id="progress-fill"></div></div>
<div id="photo-info"></div>

<!-- ── TIMER ── -->
<div id="timer-display" class="font-mono">00:00</div>

<!-- ── CONTROLS ── -->
<div id="controls" class="hidden">
  <div class="ctrl-group">
    <!-- pause -->
    <button class="btn" onclick="togglePause()" id="pause-btn">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><rect x="1" y="1" width="3.5" height="10" rx="1"/><rect x="7.5" y="1" width="3.5" height="10" rx="1"/></svg>
      一時停止
    </button>
    <!-- next photo -->
    <button class="btn" onclick="skipPhoto()">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M1 1.8L8.2 6 1 10.2V1.8zM10 1h1.5v10H10z"/></svg>
      次の写真
    </button>
  </div>
  <div class="ctrl-group">
    <!-- clock toggle -->
    <button class="btn" onclick="toggleClockMode()" id="clock-btn">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="6.5" cy="6.5" r="5.5"/><path d="M6.5 3.5v3l2 1.5" stroke-linecap="round"/></svg>
      <span id="clock-btn-label">時刻表示</span>
    </button>
    <!-- pip -->
    <button class="btn" onclick="togglePip()" id="pip-btn" title="Picture in Picture（他のタブに移動しても浮いて表示）">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="2" width="11" height="9" rx="1.5"/><rect x="6.5" y="6" width="4.5" height="3.5" rx="1" fill="currentColor" stroke="none"/></svg>
      PiP
    </button>
    <!-- settings -->
    <button class="btn" onclick="openSettings()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="currentColor"><path d="M5.5 1.5h2l.4 1.4a4.2 4.2 0 0 1 1 .6l1.4-.5 1 1.7-1.1 1a4 4 0 0 1 0 1.2l1.1 1-1 1.7-1.4-.5a4.2 4.2 0 0 1-1 .6l-.4 1.4h-2l-.4-1.4a4.2 4.2 0 0 1-1-.6l-1.4.5-1-1.7 1.1-1a4 4 0 0 1 0-1.2l-1.1-1 1-1.7 1.4.5a4.2 4.2 0 0 1 1-.6zm1 2.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5z"/></svg>
      設定
    </button>
    <!-- end -->
    <button class="btn danger" onclick="resetAll()">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="currentColor"><path d="M1 1l9 9M10 1l-9 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      終了
    </button>
  </div>
</div>

<!-- ── SETTINGS PANEL ── -->
<div id="settings-panel">
  <div class="panel-hd">設定</div>

  <!-- Font -->
  <div class="field">
    <div class="label">タイマーフォント</div>
    <div class="font-grid" id="font-grid">
      <button class="font-btn on" data-font="font-mono"     onclick="setFont(this)" style="font-family:'JetBrains Mono'">25:00<small>Mono</small></button>
      <button class="font-btn"    data-font="font-space"    onclick="setFont(this)" style="font-family:'Space Mono'">25:00<small>Space</small></button>
      <button class="font-btn"    data-font="font-bebas"    onclick="setFont(this)" style="font-family:'Bebas Neue';font-size:1.2rem">25:00<small>Bebas</small></button>
      <button class="font-btn"    data-font="font-playfair" onclick="setFont(this)" style="font-family:'Playfair Display'">25:00<small>Playfair</small></button>
      <button class="font-btn"    data-font="font-oswald"   onclick="setFont(this)" style="font-family:'Oswald';font-weight:300;letter-spacing:.08em">25:00<small>Oswald</small></button>
      <button class="font-btn"    data-font="font-dm"       onclick="setFont(this)" style="font-family:'DM Serif Display'">25:00<small>DM Serif</small></button>
      <button class="font-btn"    data-font="font-rajdhani" onclick="setFont(this)" style="font-family:'Rajdhani';font-weight:300;letter-spacing:.1em">25:00<small>Rajdhani</small></button>
    </div>
  </div>

  <hr>

  <!-- Color -->
  <div class="field">
    <div class="label">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor" style="margin-right:3px;vertical-align:middle"><circle cx="5" cy="5" r="4.5" fill="none" stroke="currentColor" stroke-width="1"/><circle cx="5" cy="5" r="2"/></svg>
      タイマーカラー
    </div>
    <div class="color-bar" id="color-swatches">
      <div class="swatch on" style="background:#e8e8e8" data-c="#e8e8e8" onclick="pickSwatch(this)"></div>
      <div class="swatch" style="background:#d4c5a9" data-c="#d4c5a9" onclick="pickSwatch(this)"></div>
      <div class="swatch" style="background:#a9c4d4" data-c="#a9c4d4" onclick="pickSwatch(this)"></div>
      <div class="swatch" style="background:#a9d4b5" data-c="#a9d4b5" onclick="pickSwatch(this)"></div>
      <div class="swatch" style="background:#d4a9c4" data-c="#d4a9c4" onclick="pickSwatch(this)"></div>
      <div class="swatch" style="background:#f5efe0" data-c="#f5efe0" onclick="pickSwatch(this)"></div>
      <!-- Color wheel button -->
      <div class="color-wheel-wrap" title="カラーホイールで選ぶ">
        <input type="color" id="color-picker" value="#e8e8e8" oninput="colorFromPicker(this.value)">
      </div>
    </div>
    <div class="hex-row">
      <span>#</span>
      <input class="hex-input" id="hex-input" value="e8e8e8" maxlength="6" oninput="colorFromHex(this.value)" placeholder="e8e8e8">
      <span style="font-size:0.66rem;color:var(--muted)">HEXコード</span>
    </div>
  </div>

  <hr>

  <!-- Size / Opacity -->
  <div class="field">
    <div class="label">フォントサイズ</div>
    <div class="range-row">
      <input type="range" min="2" max="13" step="0.5" value="5" id="font-size-range" oninput="updateFontSize(this.value)">
      <span class="range-val" id="font-size-val">5rem</span>
    </div>
  </div>
  <div class="field">
    <div class="label">タイマー透明度</div>
    <div class="range-row">
      <input type="range" min="0.1" max="1" step="0.05" value="1" id="timer-opacity-range" oninput="updateTimerOpacity(this.value)">
      <span class="range-val" id="timer-opacity-val">100%</span>
    </div>
  </div>

  <hr>

  <!-- Photo overlay -->
  <div class="field">
    <div class="label">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor" style="margin-right:3px;vertical-align:middle"><rect width="10" height="10" rx="2" fill="currentColor" opacity="0.3"/><rect x="2" y="2" width="6" height="6" rx="1"/></svg>
      写真の暗さ（タイマーを見やすくする幕）
    </div>
    <div class="range-row">
      <input type="range" min="0" max="0.88" step="0.04" value="0.35" id="overlay-range" oninput="updateOverlay(this.value)">
      <span class="range-val" id="overlay-val">35%</span>
    </div>
    <div class="label" style="margin-top:0.5rem">幕の色</div>
    <div class="tint-bar" id="tint-grid">
      <div class="tint-dot on"  style="background:#000"    data-t="0,0,0"          onclick="setTint(this)"></div>
      <div class="tint-dot"     style="background:#1a0808" data-t="40,8,8"         onclick="setTint(this)"></div>
      <div class="tint-dot"     style="background:#08081a" data-t="8,8,40"         onclick="setTint(this)"></div>
      <div class="tint-dot"     style="background:#081a08" data-t="8,40,8"         onclick="setTint(this)"></div>
      <div class="tint-dot"     style="background:#1a1108" data-t="40,28,8"        onclick="setTint(this)"></div>
      <div class="tint-dot"     style="background:#101010" data-t="16,16,16"       onclick="setTint(this)"></div>
      <div class="tint-dot"     style="background:#fff;border-color:rgba(0,0,0,.25)" data-t="255,255,255" onclick="setTint(this)"></div>
    </div>
  </div>

  <hr>

  <!-- Layout -->
  <div class="field">
    <div class="label">演出</div>
    <select id="transition-live" onchange="setTransition(this.value)">
      <option value="fade">フェード</option>
      <option value="slide">スライド</option>
      <option value="river">リバー</option>
    </select>
  </div>
  <div class="field">
    <div class="label">写真切替（秒）</div>
    <input type="number" min="3" max="60" value="8" id="interval-live" onchange="updateInterval(this.value)">
  </div>
  <div class="field">
    <div class="label">表示スタイル</div>
    <select id="display-live" onchange="setDisplayStyle(this.value)">
      <option value="">全画面</option>
      <option value="framed">フレーム</option>
    </select>
  </div>
  <div class="field">
    <div class="label">タイマー位置</div>
    <select id="pos-live" onchange="setPos(this.value)">
      <option value="pos-bottom-right">右下</option>
      <option value="pos-bottom-left">左下</option>
      <option value="pos-top-right">右上</option>
      <option value="pos-top-left">左上</option>
      <option value="pos-center">中央</option>
    </select>
  </div>
  <div class="field">
    <div class="label">タイマー音</div>
    <div class="seg" id="sound-seg-live">
      <button class="btn active" data-v="end-only">終了のみ</button>
      <button class="btn" data-v="countdown">カウント</button>
      <button class="btn" data-v="none">なし</button>
    </div>
  </div>

  <hr>
  <button class="btn" onclick="closeSettings()">閉じる</button>
</div>

<!-- ── DONE ── -->
<div id="done-overlay">
  <h2>⏱ タイマー終了</h2>
  <p>集中お疲れさまでした。</p>
  <div style="display:flex;gap:0.7rem">
    <button class="btn primary" onclick="resetAll()">最初から</button>
    <button class="btn" onclick="closeDone()">続ける</button>
  </div>
</div>

<script>
// ── Audio ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAudio() { if (!audioCtx) audioCtx = new AudioCtx(); return audioCtx; }
function beep(freq=880, dur=0.12, vol=0.4, delay=0) {
  const ctx=getAudio(), osc=ctx.createOscillator(), g=ctx.createGain();
  osc.connect(g); g.connect(ctx.destination);
  osc.frequency.value=freq; osc.type='sine';
  const t=ctx.currentTime+delay;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  osc.start(t); osc.stop(t+dur+0.05);
}
function doneSound() { beep(523,.15,.5,0); beep(659,.15,.5,.18); beep(784,.25,.5,.36); }
function tickSound() { beep(440,.06,.22); }

// ── State ──
let photos=[], photoIndex=0;
let totalSeconds=0, remainingSeconds=0;
let timerInterval=null, photoInterval=null, clockInterval=null;
let isPaused=false, soundMode='end-only';
let currentSlot='a', usedIndices=[];
let appMode='timer', clockModeActive=false;
let timerColorOverride=null;

// ── File input ──
const fileInput=document.getElementById('file-input');
const dropZone =document.getElementById('drop-zone');
dropZone.addEventListener('dragover', e=>{ e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e=>{ e.preventDefault(); dropZone.classList.remove('drag'); loadFiles([...e.dataTransfer.files]); });
fileInput.addEventListener('change',()=>loadFiles([...fileInput.files]));

function loadFiles(files) {
  const imgs=files.filter(f=>f.type.startsWith('image/'));
  if (!imgs.length) return;
  photos=imgs.map(f=>URL.createObjectURL(f));
  document.getElementById('file-count').textContent=`${photos.length} 枚の写真を読み込みました`;
}

// ── Mode seg ──
document.getElementById('mode-seg').querySelectorAll('.btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.getElementById('mode-seg').querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    appMode=btn.dataset.v;
    document.getElementById('timer-setup-fields').style.display=appMode==='clock'?'none':'';
    document.getElementById('sound-setup-field').style.display =appMode==='clock'?'none':'';
  });
});

// ── Seg buttons ──
document.querySelectorAll('.seg').forEach(seg=>{
  seg.querySelectorAll('.btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      seg.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      if (seg.id==='sound-seg'||seg.id==='sound-seg-live') soundMode=btn.dataset.v;
    });
  });
});

// ── Start ──
function startSession() {
  if (!photos.length) { alert('写真を選んでください。'); return; }
  if (appMode==='timer') {
    const h=parseInt(document.getElementById('t-hours').value)||0;
    const m=parseInt(document.getElementById('t-minutes').value)||0;
    const s=parseInt(document.getElementById('t-seconds').value)||0;
    totalSeconds=h*3600+m*60+s;
    if (totalSeconds<=0) { alert('タイマーの時間を設定してください。'); return; }
  }
  const interval=parseInt(document.getElementById('interval-input').value)||8;
  document.getElementById('interval-live').value=interval;
  setTransition(document.getElementById('transition-select').value);
  setDisplayStyle(document.getElementById('display-select').value);
  setPos(document.getElementById('pos-select').value);

  document.getElementById('setup').classList.add('hidden');
  document.getElementById('controls').classList.remove('hidden');

  remainingSeconds=totalSeconds;
  isPaused=false;
  usedIndices=[];
  clockModeActive=(appMode==='clock');

  syncPauseBtnLabel();
  updateClockBtn();
  showNextPhoto();
  startPhotoLoop(interval);

  if (clockModeActive) startClockMode();
  else { updateTimerDisplay(); startCountdown(); }
}

// ── Countdown ──
function startCountdown() {
  clearInterval(timerInterval); clearInterval(clockInterval);
  timerInterval=setInterval(()=>{
    if (isPaused) return;
    remainingSeconds--;
    updateTimerDisplay();
    updateProgress();
    if (soundMode==='countdown'&&remainingSeconds<=10&&remainingSeconds>0) tickSound();
    if (remainingSeconds<=0) {
      clearInterval(timerInterval); clearInterval(photoInterval);
      if (soundMode!=='none') doneSound();
      document.getElementById('done-overlay').classList.add('show');
    }
  },1000);
}

function updateTimerDisplay() {
  const d=document.getElementById('timer-display');
  const h=Math.floor(remainingSeconds/3600);
  const m=Math.floor((remainingSeconds%3600)/60);
  const s=remainingSeconds%60;
  const txt=h>0?`${pad(h)}:${pad(m)}:${pad(s)}`:`${pad(m)}:${pad(s)}`;
  d.textContent=txt;
  syncPipTimer(txt);
  if (!timerColorOverride) {
    d.classList.remove('warning','urgent');
    if (remainingSeconds<=60) d.classList.add('warning');
    if (remainingSeconds<=10) d.classList.add('urgent');
  }
}

function pad(n) { return String(n).padStart(2,'0'); }

function updateProgress() {
  const pct=((totalSeconds-remainingSeconds)/totalSeconds)*100;
  document.getElementById('progress-fill').style.width=pct+'%';
}

// ── Clock mode ──
function startClockMode() {
  clearInterval(timerInterval); clearInterval(clockInterval);
  renderClock();
  clockInterval=setInterval(renderClock,1000);
}
function renderClock() {
  const now=new Date();
  const txt=`${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  document.getElementById('timer-display').textContent=txt;
  syncPipTimer(txt);
  if (!timerColorOverride) document.getElementById('timer-display').classList.remove('warning','urgent');
}
function toggleClockMode() {
  clockModeActive=!clockModeActive;
  if (clockModeActive) startClockMode();
  else { clearInterval(clockInterval); if (appMode==='timer') { updateTimerDisplay(); startCountdown(); } }
  updateClockBtn();
}
function updateClockBtn() {
  document.getElementById('clock-btn-label').textContent=clockModeActive?'タイマーへ':'時刻表示';
  document.getElementById('clock-btn').classList.toggle('on',clockModeActive);
}

// ── Font ──
function setFont(btn) {
  document.querySelectorAll('#font-grid .font-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const d=document.getElementById('timer-display');
  d.classList.remove('font-mono','font-space','font-bebas','font-playfair','font-oswald','font-dm','font-rajdhani');
  d.classList.add(btn.dataset.font);
  syncPipFontClass(btn.dataset.font);
}

// ── Timer Color ──
function pickSwatch(el) {
  document.querySelectorAll('#color-swatches .swatch').forEach(s=>s.classList.remove('on'));
  el.classList.add('on');
  applyTimerColor(el.dataset.c);
  document.getElementById('color-picker').value=el.dataset.c;
  document.getElementById('hex-input').value=el.dataset.c.replace('#','');
}
function colorFromPicker(val) {
  document.querySelectorAll('#color-swatches .swatch').forEach(s=>s.classList.remove('on'));
  applyTimerColor(val);
  document.getElementById('hex-input').value=val.replace('#','');
}
function colorFromHex(val) {
  const c=val.replace(/[^0-9a-fA-F]/g,'');
  if (c.length===6) {
    const hex='#'+c;
    document.querySelectorAll('#color-swatches .swatch').forEach(s=>s.classList.remove('on'));
    applyTimerColor(hex);
    document.getElementById('color-picker').value=hex;
  }
}
function applyTimerColor(hex) {
  const d=document.getElementById('timer-display');
  d.style.color=hex; d.classList.remove('warning','urgent');
  timerColorOverride=hex;
  syncPipTimerColor(hex);
}

// ── Size / Opacity ──
function updateFontSize(v) {
  document.documentElement.style.setProperty('--timer-size',v+'rem');
  document.getElementById('font-size-val').textContent=v+'rem';
  syncPipFontSize(v);
}
function updateTimerOpacity(v) {
  document.getElementById('timer-display').style.opacity=v;
  document.getElementById('timer-opacity-val').textContent=Math.round(v*100)+'%';
}

// ── Overlay ──
function updateOverlay(v) {
  document.documentElement.style.setProperty('--overlay-opacity',v);
  document.getElementById('overlay-val').textContent=Math.round(v*100)+'%';
}
function setTint(btn) {
  document.querySelectorAll('#tint-grid .tint-dot').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.documentElement.style.setProperty('--overlay-color',btn.dataset.t);
}

// ── Transitions / Layout ──
function setTransition(v) { document.body.classList.remove('transition-fade','transition-slide','transition-river'); document.body.classList.add('transition-'+v); }
function setDisplayStyle(v) { document.body.classList.remove('framed'); if (v==='framed') document.body.classList.add('framed'); }
function setPos(v) { document.body.classList.remove('pos-center','pos-bottom-right','pos-bottom-left','pos-top-right','pos-top-left'); document.body.classList.add(v); }
function updateInterval(v) { clearInterval(photoInterval); startPhotoLoop(parseInt(v)); }

// ── Photos ──
function pickNextIndex() {
  if (usedIndices.length>=photos.length) usedIndices=[];
  const avail=photos.map((_,i)=>i).filter(i=>!usedIndices.includes(i));
  const idx=avail[Math.floor(Math.random()*avail.length)];
  usedIndices.push(idx); return idx;
}
function showNextPhoto() {
  const idx=pickNextIndex();
  const next=currentSlot==='a'?'b':'a';
  const nEl=document.getElementById('slot-'+next);
  const oEl=document.getElementById('slot-'+currentSlot);
  nEl.style.backgroundImage=`url("${photos[idx]}")`;
  nEl.classList.remove('leaving','active'); void nEl.offsetWidth;
  oEl.classList.remove('active'); oEl.classList.add('leaving');
  nEl.classList.add('active');
  setTimeout(()=>oEl.classList.remove('leaving'),1600);
  currentSlot=next; photoIndex=usedIndices.length;
  document.getElementById('photo-info').textContent=`${photoIndex} / ${photos.length}`;
  syncPipPhoto(photos[idx]);
}
function startPhotoLoop(interval) {
  clearInterval(photoInterval);
  photoInterval=setInterval(()=>{ if (!isPaused) showNextPhoto(); },interval*1000);
}
function skipPhoto() {
  showNextPhoto();
  clearInterval(photoInterval);
  startPhotoLoop(parseInt(document.getElementById('interval-live').value)||8);
}

// ── Pause ──
function togglePause() {
  isPaused=!isPaused;
  syncPauseBtnLabel();
}
function syncPauseBtnLabel() {
  const btn=document.getElementById('pause-btn');
  btn.querySelector('svg').innerHTML=isPaused
    ? '<polygon points="2,1 10,6 2,11"/>'  // play triangle
    : '<rect x="1" y="1" width="3.5" height="10" rx="1"/><rect x="7.5" y="1" width="3.5" height="10" rx="1"/>'; // pause bars
  btn.childNodes[btn.childNodes.length-1].textContent=isPaused?' 再開':' 一時停止';
}

// ── Settings ──
function openSettings()  { document.getElementById('settings-panel').classList.add('open'); }
function closeSettings() { document.getElementById('settings-panel').classList.remove('open'); }

// ── Controls auto-hide ──
let hideTO;
document.addEventListener('mousemove',()=>{
  const c=document.getElementById('controls');
  c.classList.remove('hidden');
  clearTimeout(hideTO);
  if (!document.getElementById('settings-panel').classList.contains('open'))
    hideTO=setTimeout(()=>c.classList.add('hidden'),3200);
});

// ════════════════════════════════════════════
// ── Picture-in-Picture (Document PiP API) ──
// Uses the modern Document Picture-in-Picture API (Chrome 116+)
// Opens a real floating OS window — survives tab switches, doesn't need screen share.
// Fallback: if not supported, shows an in-page floating widget.
// ════════════════════════════════════════════

let pipWindow = null;

// Refs into the PiP window DOM (updated after open)
let pipTimerEl = null;
let pipPhotoEl = null;
let pipModeEl  = null; // 'timer' | 'photo' | 'both'
let pipCurrentMode = 'both';

async function togglePip() {
  if (pipWindow && !pipWindow.closed) { closePip(); return; }

  // Check Document PiP support
  if (!window.documentPictureInPicture) {
    alert('このブラウザはDocument PiPに対応していません。\nChrome 116以降をお使いください。');
    return;
  }

  try {
    pipWindow = await window.documentPictureInPicture.requestWindow({
      width: 320, height: 220,
      disallowReturnToOpener: false,
    });
  } catch(e) {
    if (e.name !== 'NotAllowedError') alert('PiP起動失敗: ' + e.message);
    return;
  }

  // ── Inject content into PiP window ──
  const doc = pipWindow.document;
  doc.title = 'Timer PiP';

  // Copy Google Fonts link
  const link = doc.createElement('link');
  link.rel='stylesheet';
  link.href='https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=JetBrains+Mono:wght@400&family=Space+Mono&family=Bebas+Neue&family=Playfair+Display:wght@400&family=Oswald:wght@300&family=DM+Serif+Display&family=Rajdhani:wght@300&display=swap';
  doc.head.appendChild(link);

  // Inject styles
  const style = doc.createElement('style');
  style.textContent = `
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0f0f0f;color:#e8e8e8;font-family:'Inter',sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;}
    #pip-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0.55;transition:opacity 1s,background-image 1.5s;}
    #pip-dim{position:absolute;inset:0;background:rgba(0,0,0,0.45);}
    #pip-timer{position:relative;z-index:2;font-size:4rem;line-height:1;text-shadow:0 2px 10px rgba(0,0,0,0.7);transition:color 0.3s;}
    #pip-label{position:relative;z-index:2;font-size:0.62rem;color:rgba(255,255,255,0.38);letter-spacing:0.1em;text-transform:uppercase;margin-top:0.4rem;}
    #pip-controls{position:absolute;bottom:0;left:0;right:0;z-index:3;display:flex;gap:0.4rem;justify-content:center;padding:0.55rem;background:rgba(0,0,0,0.5);}
    .pb{background:rgba(255,255,255,0.1);border:0.5px solid rgba(255,255,255,0.14);color:#e8e8e8;font-size:0.7rem;padding:0.28rem 0.6rem;border-radius:5px;cursor:pointer;font-family:'Inter',sans-serif;}
    .pb:hover{background:rgba(255,255,255,0.2);}
    .pb.on{background:rgba(212,197,169,0.2);border-color:rgba(212,197,169,0.4);color:#d4c5a9;}
    .font-mono{font-family:'JetBrains Mono',monospace!important;letter-spacing:-0.02em!important;}
    .font-space{font-family:'Space Mono',monospace!important;letter-spacing:-0.03em!important;}
    .font-bebas{font-family:'Bebas Neue',sans-serif!important;letter-spacing:0.06em!important;}
    .font-playfair{font-family:'Playfair Display',serif!important;}
    .font-oswald{font-family:'Oswald',sans-serif!important;font-weight:300!important;letter-spacing:0.09em!important;}
    .font-dm{font-family:'DM Serif Display',serif!important;}
    .font-rajdhani{font-family:'Rajdhani',sans-serif!important;font-weight:300!important;letter-spacing:0.14em!important;}
  `;
  doc.head.appendChild(style);

  doc.body.innerHTML = `
    <div id="pip-bg"></div>
    <div id="pip-dim"></div>
    <div id="pip-timer" class="font-mono">--:--</div>
    <div id="pip-label">Photo Flow Timer</div>
    <div id="pip-controls">
      <button class="pb" id="pip-pause-btn" onclick="window.opener && window.opener.togglePause && window.opener.togglePause()">⏸ 一時停止</button>
      <button class="pb" id="pip-next-btn" onclick="window.opener && window.opener.skipPhoto && window.opener.skipPhoto()">⏭ 次の写真</button>
      <button class="pb on" id="pip-mode-btn" onclick="pipCycleMode()">🖼＋⏱</button>
    </div>
  `;

  pipTimerEl = doc.getElementById('pip-timer');
  pipPhotoEl = doc.getElementById('pip-bg');
  pipModeEl  = doc.getElementById('pip-mode-btn');
  pipCurrentMode = 'both';

  // Inject cycle mode function into pip window
  pipWindow.pipCycleMode = function() {
    const modes = ['both','timer','photo'];
    const labels = { both:'🖼＋⏱', timer:'⏱ のみ', photo:'🖼 のみ' };
    const idx = modes.indexOf(pipCurrentMode);
    pipCurrentMode = modes[(idx+1)%3];
    pipModeEl.textContent = labels[pipCurrentMode];
    const bg = pipWindow.document.getElementById('pip-bg');
    const tmr = pipWindow.document.getElementById('pip-timer');
    bg.style.opacity  = pipCurrentMode==='timer' ? '0' : '0.55';
    tmr.style.display = pipCurrentMode==='photo' ? 'none' : '';
  };

  // Sync current state immediately
  const mainTimer = document.getElementById('timer-display');
  pipTimerEl.textContent = mainTimer.textContent;
  pipTimerEl.style.color = mainTimer.style.color || '#e8e8e8';
  pipTimerEl.style.fontSize = getComputedStyle(document.documentElement).getPropertyValue('--timer-size');

  // Copy current photo
  const activeSlot = document.getElementById('slot-' + currentSlot);
  if (activeSlot.style.backgroundImage) pipPhotoEl.style.backgroundImage = activeSlot.style.backgroundImage;

  // Copy current font class
  const fontClasses = ['font-mono','font-space','font-bebas','font-playfair','font-oswald','font-dm','font-rajdhani'];
  fontClasses.forEach(fc => { if (mainTimer.classList.contains(fc)) { pipTimerEl.classList.remove(...fontClasses); pipTimerEl.classList.add(fc); } });

  pipWindow.addEventListener('pagehide', () => { pipWindow = null; pipTimerEl = null; pipPhotoEl = null; document.getElementById('pip-btn').classList.remove('on'); });
  document.getElementById('pip-btn').classList.add('on');
}

function closePip() {
  if (pipWindow && !pipWindow.closed) pipWindow.close();
  pipWindow=null; pipTimerEl=null; pipPhotoEl=null;
  document.getElementById('pip-btn').classList.remove('on');
}

// Sync helpers — called whenever state changes
function syncPipTimer(txt) {
  if (!pipTimerEl) return;
  pipTimerEl.textContent=txt;
}
function syncPipTimerColor(hex) {
  if (!pipTimerEl) return;
  pipTimerEl.style.color=hex;
}
function syncPipFontClass(cls) {
  if (!pipTimerEl) return;
  ['font-mono','font-space','font-bebas','font-playfair','font-oswald','font-dm','font-rajdhani'].forEach(c=>pipTimerEl.classList.remove(c));
  pipTimerEl.classList.add(cls);
}
function syncPipFontSize(v) {
  if (!pipTimerEl) return;
  pipTimerEl.style.fontSize = Math.min(parseFloat(v)*0.6, 5) + 'rem';
}
function syncPipPhoto(url) {
  if (!pipPhotoEl) return;
  pipPhotoEl.style.backgroundImage=`url("${url}")`;
}

// ── Done / Reset ──
function closeDone() { document.getElementById('done-overlay').classList.remove('show'); }

function resetAll() {
  clearInterval(timerInterval); clearInterval(photoInterval); clearInterval(clockInterval);
  closePip();
  document.getElementById('done-overlay').classList.remove('show');
  document.getElementById('controls').classList.add('hidden');
  document.getElementById('setup').classList.remove('hidden');
  ['slot-a','slot-b'].forEach(id=>{
    const el=document.getElementById(id);
    el.style.backgroundImage=''; el.className='photo-slot';
  });
  document.getElementById('progress-fill').style.width='0%';
  const d=document.getElementById('timer-display');
  d.textContent='00:00'; d.classList.remove('warning','urgent');
  isPaused=false; clockModeActive=false; remainingSeconds=0;
  syncPauseBtnLabel();
  updateClockBtn();
}
</script>
</body>
</html>
